name: Test Optional Packages

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'List (comma separated, no whitespaces) of optional packages'
        required: true
        type: string

jobs:
  prepare:
    name: Build and Test Sage with given optional packages
    runs-on: ubuntu-latest
    outputs:
       opt_targets_docker: ${{ steps.convert.outputs.opt_targets_docker }}
       opt_targets_macos: ${{ steps.convert.outputs.opt_targets_macos }}
    steps:
     - name: Checkout
       uses: actions/checkout@v4

     - name: Convert input
       id: convert
       run: |
         IFS=',' read -r -a array <<< "${{ github.event.inputs.packages }}"
         opt_targets_docker=$(for a in "${array[@]}"; do echo "${a}-ensure"; done | tr '\n' ' ')
         opt_targets_macos=$(for a in "${array[@]}"; do echo "${a}"; done | tr '\n' ' ')
         echo "opt_targets_docker=${opt_targets_docker}" >> "$GITHUB_OUTPUT"
         echo "opt_targets_macos=${opt_targets_macos}" >> "$GITHUB_OUTPUT"

  run_tests_on_docker:
    needs: prepare
    name: Call reusable workflow docker.yml
    uses: ./.github/workflows/docker.yml
    with:
      targets: "${{ needs.prepare.outputs.opt_targets_docker }} ci-build-with-fallback ptest-nodoc"
      incremental: false
      tox_system_factors: >-
        ["ubuntu-noble",
         "debian-trixie",
         "fedora-42",]
      tox_packages_factors: >-
        ["standard"]
      max_parallel: 4

  macos:
    needs: prepare
    name: Build and Test optional packages (macos-${{ matrix.version }})
    runs-on: macos-${{ matrix.version }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '15'
          - '26'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python packages
        run: |
          pip install setuptools

      - name: Install dependencies
        run: |
          eval $(build/bin/sage-print-system-package-command homebrew update)
          eval $(build/bin/sage-print-system-package-command homebrew --yes --ignore-missing install $(build/bin/sage-get-system-packages homebrew _bootstrap _prereq $(build/bin/sage-package list :standard:)))
          brew install libomp Macaulay2/homebrew-tap/gfan Macaulay2/homebrew-tap/linbox

      - name: Build
        run: |
          source ./.homebrew-build-env
          ./bootstrap
          ./configure --enable-download-from-upstream-url --with-darwin-accelerate
          make build V=0
        env:
          MAKE: 'make -j6'

      - name: Install optional packages
        run: |
          source ./.homebrew-build-env
          ./sage -i ${{ needs.prepare.outputs.opt_targets_macos }}

      - name: Run tests
        continue-on-error: true
        run: |
          source ./.homebrew-build-env
          ./sage -t --all -p4
